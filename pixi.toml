[workspace]
authors = ["Modular <hello@modular.com>"]
channels = ["https://conda.modular.com/max", "conda-forge", "pytorch"]
description = "Mamba-3 Mojo Benchmarking"
name = "mamba3-mojo-bench"
platforms = ["osx-arm64", "linux-aarch64", "linux-64"]
version = "0.1.0"

[tasks]
bench = "export PYTHONPATH=$(pwd):$PYTHONPATH && python bench_mamba3.py"

[dependencies]
python = ">=3.10"
max = "*"
modular = "*"
pytorch = ">=2.4"
einops = "*"
transformers = "*"
numpy = "*"
ninja = "*"
packaging = "*"
